  <style>
:root {
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-success:#437a22;--color-error:#a12c7b;--color-warning:#964219;
  --color-blue:#006494;--color-gold:#d19900;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/.08);
  --tr:180ms cubic-bezier(.16,1,.3,1);
  --font-body:'Inter',sans-serif;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);min-height:100dvh}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;background:var(--color-surface);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:1rem}
.back-link{color:var(--color-primary);text-decoration:none;font-size:var(--text-sm)}

.status-tag{display:inline-block;margin-top:.5rem;padding:.25rem .75rem;border-radius:9999px;font-size:var(--text-xs)}

.kpi-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:.25rem}
.kpi-value{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums}

.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
@media(max-width:768px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem}

table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
th{text-align:left;padding:.5rem .75rem;background:var(--color-surface-offset);border-bottom:2px solid var(--color-border);font-weight:600;font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.04em}
td{padding:.5rem .75rem;border-bottom:1px solid var(--color-divider);font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-surface-offset)}
.table-wrap{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:auto;margin-bottom:1.5rem}
.pill{display:inline-block;padding:1px 8px;border-radius:9999px;font-size:var(--text-xs);font-weight:500}

<body>

<main class="main-content">

<script>
// ─── THEME ──────────────────────────────────────────────────────────────────
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  t&&t.addEventListener('click',()=>{ d=d==='dark'?'light':'dark'; r.setAttribute('data-theme',d); });
})();

// ─── CONSTANTS ──────────────────────────────────────────────────────────────
const MISSING_KSLS = ['KSL-2a','KSL-2b','KSL-2c','KSL-3a','KSL-5b','KSL-6'];
const MONTHS = ['March','April','May'];

// ─── COLUMN MAPS ────────────────────────────────────────────────────────────
// English schema — V2 polished XLSX (exact headers from your files)
const COLUMN_MAP_EN = {
  'SLA_Code':        'sla_code',
  'SLA_N':           'sla_name',
  'Compare_Dir':     'compare_dir',
  'Numerator':       'numerator',
  'Denominator':     'denominator',
  'DATE_CLOSE':      'date_closed',
  'DATE_RECEIVED':   'date_received',
  'Status':          'status',
  'ISO_Language':    'iso_language',
  'Language_Name':   'language_name',
  'Incident Ticket': 'incident_ticket',
  'Queue':           'queue',
  'TOPIC':           'topic',
  'Tool':            'tool',
  'Excluded':        'excluded_raw',
};

// German schema — raw 3093 CSV export
const COLUMN_MAP_DE = {
  'SLA Kennzahl':                               'sla_code',
  'SLA Kennzahl Name':                          'sla_name',
  'SLA Kennzahl Vergleichsart':                 'compare_dir',
  'Anzahl SLAs Kennzahl Z\u00e4hler vor SR':    'numerator',
  'Anzahl SLAs Kennzahl Nenner vor SR':         'denominator',
  'Element geschlossen am':                     'date_closed',
  'Element eingegangen am':                     'date_received',
  'Element Status':                             'status',
  'Incident Element Supportsprache':            'iso_language',
  'Incident Element Supportsprache Name EN':    'language_name',
  'Incident Ticket':                            'incident_ticket',
  'Ticket Gruppe':                              'queue',
  'KM Anwendung':                               'topic',
};

/**
 * detectSLASchema
 * Scores headers against both maps using a 1.5x ratio threshold.
 * Returns { map, schema: 'english' | 'german' | 'mixed' | 'unknown' }
 * Mixed = both schemas partially match; merged map captures all known columns.
 */
function detectSLASchema(headers) {
  const hSet = new Set(headers.map(h => h.trim()));
  const enScore = Object.keys(COLUMN_MAP_EN).filter(k => hSet.has(k)).length;
  const deScore = Object.keys(COLUMN_MAP_DE).filter(k => hSet.has(k)).length;

  if (enScore === 0 && deScore === 0) return { map: COLUMN_MAP_EN, schema: 'unknown' };
  if (enScore === 0) return { map: COLUMN_MAP_DE, schema: 'german' };
  if (deScore === 0) return { map: COLUMN_MAP_EN, schema: 'english' };

  // Both have hits — use 1.5x threshold to pick a winner
  if (enScore >= deScore * 1.5) return { map: COLUMN_MAP_EN, schema: 'english' };
  if (deScore >= enScore * 1.5) return { map: COLUMN_MAP_DE, schema: 'german' };

  // True mixed: merge both maps; English takes priority for shared target fields
  const merged = Object.assign({}, COLUMN_MAP_DE, COLUMN_MAP_EN);
  return { map: merged, schema: 'mixed' };
}

// ─── DATE HELPERS ───────────────────────────────────────────────────────────
function monthFromDate(val) {
  if (!val && val !== 0) return 'Unknown';

  // Excel serial number (number from XLSX raw:true)
  if (typeof val === 'number') {
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    if (!isNaN(d)) return _monthIdx(d.getUTCMonth());
  }

  const s = String(val).trim();

  // DD.MM.YYYY or DD.MM.YYYY HH:MM:SS (V2 format)
  if (/^\d{2}\.\d{2}\.\d{4}/.test(s)) {
    const m = parseInt(s.split('.')[1], 10) - 1;
    return _monthIdx(m);
  }

  // ISO 8601 / other string formats
  const d = new Date(s);
  return isNaN(d) ? 'Unknown' : _monthIdx(d.getMonth());
}
function _monthIdx(m) { return m===2?'March':m===3?'April':m===4?'May':'Unknown'; }
function toNumber(v)  { const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n; }
function normalizeQueue(q) { const s=String(q||'').toLowerCase(); return s.startsWith('aos')?'aos':s.startsWith('ilz')?'ilz':s; }

// ─── ROW MAPPER ─────────────────────────────────────────────────────────────
function mapRow(rawRow, columnMap) {
  const mapped = {};
  for (const [src, tgt] of Object.entries(columnMap)) {
    if (rawRow[src] !== undefined) mapped[tgt] = rawRow[src];
    else if (mapped[tgt] === undefined) mapped[tgt] = '';
  }
  return mapped;
}

// ─── BREACH RECORD BUILDER ──────────────────────────────────────────────────
function buildSLARecord(fileName, mapped, schema) {
  const numerator   = toNumber(mapped.numerator);
  const denominator = toNumber(mapped.denominator);
  const compareDir  = toNumber(mapped.compare_dir);
  const month       = monthFromDate(mapped.date_closed);

  let isBreach = false;
  if (schema === 'english') {
    // English V2 files: every row IS a breach; Excluded=1 means it was excluded/waived
    const excl = String(mapped.excluded_raw || '').trim();
    const isExcluded = excl === '1' || excl.toLowerCase() === 'y' || excl.toLowerCase() === 'yes';
    isBreach = !isExcluded;
  } else {
    // German (3093) or mixed: use Compare_Dir + numerator/denominator logic
    if (compareDir ===  1) isBreach = numerator < denominator;
    if (compareDir === -1) isBreach = numerator > 0;
  }

  return {
    source: 'sla', file_name: fileName, month, schema,
    sla_code:        String(mapped.sla_code        || '').trim(),
    sla_name:        String(mapped.sla_name        || '').trim(),
    compare_dir: compareDir, numerator, denominator,
    incident_ticket: String(mapped.incident_ticket || '').trim(),
    status:          String(mapped.status          || '').trim(),
    queue:           String(mapped.queue           || '').trim(),
    queue_normalized: normalizeQueue(mapped.queue),
    iso_language:    String(mapped.iso_language    || '').trim(),
    language_name:   String(mapped.language_name   || '').trim(),
    topic:           String(mapped.topic           || '').trim(),
    excluded: schema === 'english'
      ? (String(mapped.excluded_raw || '').trim() === '1')
      : false,
    is_breach: Boolean(isBreach),
    raw: mapped,
  };
}

// ─── CSV PARSER ─────────────────────────────────────────────────────────────
function parseSLACsv(fileName, csvText) {
  const result = Papa.parse(csvText, { header: true, skipEmptyLines: true, dynamicTyping: false });
  if (!result.data.length) return [];
  const headers = Object.keys(result.data[0]);
  const { map, schema } = detectSLASchema(headers);
  return result.data
    .map(row => buildSLARecord(fileName, mapRow(row, map), schema))
    .filter(r => r.sla_code && MONTHS.includes(r.month));
}

// ─── XLSX SLA PARSER ────────────────────────────────────────────────────────
function parseSLAWorkbook(fileName, workbook) {
  const records = [];
  for (const sheetName of workbook.SheetNames) {
    const sheet = workbook.Sheets[sheetName];
    const rows  = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: true });
    if (rows.length < 2) continue;

    // Scan first 5 rows to find the header row
    let headerIdx = -1;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      const candidates = rows[i].map(v => String(v).trim());
      if (detectSLASchema(candidates).schema !== 'unknown') { headerIdx = i; break; }
    }
    if (headerIdx === -1) continue;

    const headers   = rows[headerIdx].map(v => String(v).trim());
    const { map, schema } = detectSLASchema(headers);
    const dataRows  = rows.slice(headerIdx + 1).filter(r => r.some(Boolean));

    dataRows.forEach(row => {
      const rawRow = Object.fromEntries(headers.map((h, i) => [h, row[i] ?? '']));
      const rec    = buildSLARecord(fileName, mapRow(rawRow, map), schema);
      if (rec.sla_code && MONTHS.includes(rec.month)) records.push(rec);
    });

    if (records.length > 0) break; // stop after first productive sheet
  }
  return records;
}

// ─── BREACHES XLSX PARSER ───────────────────────────────────────────────────
function detectMonthFromFilename(name) {
  const n = name.toLowerCase();
  if (n.includes('march') || n.includes('mar')) return 'March';
  if (n.includes('april') || n.includes('apr')) return 'April';
  if (n.includes('may')   || n.includes('mai')) return 'May';
  return 'Unknown';
}

function parseBreachesWorkbook(fileName, workbook) {
  const records = [];
  const fallbackMonth = detectMonthFromFilename(fileName);
  workbook.SheetNames.filter(n => n !== 'Instructions').forEach(sheetName => {
    const sheet   = workbook.Sheets[sheetName];
    const rows    = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    const hi      = rows.findIndex(row => row.some(cell => String(cell||'').trim() === 'Incident Ticket'));
    if (hi === -1) return;
    const headers  = rows[hi].map(v => String(v).trim());
    rows.slice(hi + 1).filter(r => r.some(Boolean)).forEach(row => {
      const item     = Object.fromEntries(headers.map((h, i) => [h, row[i] ?? '']));
      const excluded = Number(item.Excluded || 0) === 1;
      records.push({
        source: 'breaches', month: fallbackMonth, sla_code: sheetName, schema: 'english',
        incident_ticket: item['Incident Ticket'] || '',
        status: item.Status || '', queue: item.Queue || '',
        iso_language: item.ISO_Language || '', topic: item.TOPIC || '',
        excluded, is_breach: !excluded, raw: item,
      });
    });
  });
  return records;
}

// ─── STATE ──────────────────────────────────────────────────────────────────
let allRecords = [], breachesRecords = [], slaRecords = [];

// ─── DOM ────────────────────────────────────────────────────────────────────
const runBtn      = document.getElementById('runAnalysis');
const exportBtn   = document.getElementById('exportCsv');
const monthFilter = document.getElementById('monthFilter');
const tabNav      = document.getElementById('tabNav');
function setStatus(id, msg, state) { const el=document.getElementById(id); el.textContent=msg; el.className='status-tag status-'+state; }
function updateRunBtn() { if (breachesRecords.length||slaRecords.length) { runBtn.disabled=false; } }

// ─── FILE HANDLERS ──────────────────────────────────────────────────────────
document.getElementById('breachesFiles').addEventListener('change', async e => {
  breachesRecords = [];
  for (const file of Array.from(e.target.files||[])) {
    const buf = await file.arrayBuffer();
    breachesRecords.push(...parseBreachesWorkbook(file.name, XLSX.read(buf, {type:'array'})));
  }
  setStatus('breachesStatus', `${e.target.files.length} file(s) — ${breachesRecords.length} rows parsed`, 'ok');
  updateRunBtn();
});

document.getElementById('slaFiles').addEventListener('change', async e => {
  slaRecords = [];
  const schemasSeen = new Set();
  for (const file of Array.from(e.target.files||[])) {
    const ext = file.name.split('.').pop().toLowerCase();
    let recs;
    if (ext === 'xlsx' || ext === 'xls') {
      const buf = await file.arrayBuffer();
      recs = parseSLAWorkbook(file.name, XLSX.read(buf, {type:'array', cellDates:false}));
    } else {
      recs = parseSLACsv(file.name, await file.text());
    }
    recs.forEach(r => schemasSeen.add(r.schema));
    slaRecords.push(...recs);
  }
  const schemaLabel = schemasSeen.size > 1 ? 'mixed' : ([...schemasSeen][0] || 'unknown');
  setStatus('slaStatus', `${e.target.files.length} file(s) — ${slaRecords.length} rows [schema: ${schemaLabel}]`, 'ok');
  updateRunBtn();
});

// ─── RUN ────────────────────────────────────────────────────────────────────
runBtn.addEventListener('click', () => {
  allRecords = [...breachesRecords, ...slaRecords];
  renderAll();
  tabNav.style.display = 'flex';
  exportBtn.disabled = false;
});
monthFilter.addEventListener('change', () => { if (allRecords.length) renderAll(); });
function filtered() {
  const m = monthFilter.value;
  return m === 'all' ? allRecords : allRecords.filter(r => r.month === m);
}

// ─── TABS ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

function renderAll() {
  const r = filtered();
  renderKPIs(r); renderTrendChart(r); renderSourceChart(r);
  renderOverviewTable(r); renderLanguageHeatmap(r);
  renderMissingKSLs(r); renderAlerts(r);
}

// ─── KPIs ───────────────────────────────────────────────────────────────────
function renderKPIs(records) {
  const total  = records.length;
  const totalB = records.filter(r=>r.is_breach).length;
  const rate   = total ? ((totalB/total)*100).toFixed(1) : 0;
  document.getElementById('kpiRow').innerHTML = [
    kpi('Total Records',    total.toLocaleString(), ''),
    kpi('Total Breaches',   totalB.toLocaleString(), rate+'% breach rate', true),
    kpi('Breaches source',  records.filter(r=>r.is_breach&&r.source==='breaches').length.toLocaleString(), 'from Breaches files'),
    kpi('SLA source',       records.filter(r=>r.is_breach&&r.source==='sla').length.toLocaleString(), 'from SLA files'),
    kpi('Languages hit',    new Set(records.filter(r=>r.is_breach).map(r=>r.iso_language)).size, 'with breaches', totalB>0),
  ].join('');
}
function kpi(label,value,sub,breach=false) {
  return `<div class="kpi-card${breach?' kpi-breach':''}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${value}</div>
    ${sub?`<div class="kpi-sub">${sub}</div>`:''}
  </div>`;
}

// ─── TREND CHART ─────────────────────────────────────────────────────────────
let trendInst=null;
function renderTrendChart(records) {
  const codes = [...new Set(records.map(r=>r.sla_code))].filter(Boolean).sort();
  const ctx   = document.getElementById('trendChart').getContext('2d');
  if (trendInst) trendInst.destroy();
  trendInst = new Chart(ctx, {
    type:'line',
    data:{ labels:MONTHS, datasets: codes.map((c,i)=>({ label:c,
      data: MONTHS.map(m=>records.filter(r=>r.sla_code===c&&r.month===m&&r.is_breach).length),
      borderColor:`hsl(${(i*47)%360},60%,45%)`,
      backgroundColor:`hsl(${(i*47)%360},60%,45%,0.1)`,
      tension:0.3, fill:false })) },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:10} } } } }
  });
}

// ─── SOURCE CHART ────────────────────────────────────────────────────────────
let srcInst=null;
function renderSourceChart(records) {
  const bB=records.filter(r=>r.is_breach&&r.source==='breaches').length;
  const sB=records.filter(r=>r.is_breach&&r.source==='sla').length;
  const ctx=document.getElementById('sourceChart').getContext('2d');
  if (srcInst) srcInst.destroy();
  srcInst = new Chart(ctx,{ type:'doughnut',
    data:{ labels:['Breaches','SLA'], datasets:[{ data:[bB,sB], backgroundColor:['#006494','#d19900'], borderWidth:0 }] },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom' } } }
  });
}

// ─── OVERVIEW TABLE ──────────────────────────────────────────────────────────
function renderOverviewTable(records) {
  const codes = [...new Set(records.map(r=>r.sla_code))].filter(Boolean).sort();
  const rows  = codes.map(code => {
    const recs = records.filter(r=>r.sla_code===code);
    const B    = recs.filter(r=>r.is_breach).length;
    const rate = recs.length ? ((B/recs.length)*100).toFixed(1) : '0.0';
    const src  = [...new Set(recs.map(r=>r.source))].map(s=>`<span class="pill pill-${s}">${s}</span>`).join(' ');
    return `<tr><td>${code}</td><td>${recs.length.toLocaleString()}</td><td>${B.toLocaleString()}</td><td>${rate}%</td><td>${src}</td></tr>`;
  });
  document.getElementById('overviewTable').innerHTML =
    `<div class="table-wrap"><table><thead><tr><th>SLA Code</th><th>Records</th><th>Breaches</th><th>Rate</th><th>Source</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
}

// ─── LANGUAGE HEATMAP ────────────────────────────────────────────────────────
function renderLanguageHeatmap(records) {
  const B = records.filter(r=>r.is_breach);
  const langs = [...new Set(B.map(r=>r.iso_language))].filter(Boolean).sort();
  const codes = [...new Set(B.map(r=>r.sla_code))].filter(Boolean).sort();
  if (!langs.length) { document.getElementById('languageHeatmap').innerHTML='<div class="empty-state">No breach data for language analysis.</div>'; return; }
  const maxVal = Math.max(...langs.flatMap(l=>codes.map(c=>B.filter(r=>r.iso_language===l&&r.sla_code===c).length)),1);
  function heatBg(v) {
    if (!v) return 'transparent';
    const p = v/maxVal;
    return `rgba(${Math.round(161+(255-161)*p)},${Math.round(44+(200-44)*(1-p))},${Math.round(123+(200-123)*(1-p))},0.35)`;
  }
  const bodyRows = langs.map(lang => {
    const total = B.filter(r=>r.iso_language===lang).length;
    const cells = codes.map(code => { const v=B.filter(r=>r.iso_language===lang&&r.sla_code===code).length; return `<td class="heat-cell" style="background:${heatBg(v)}">${v||''}</td>`; });
    return `<tr><td><strong>${lang}</strong></td>${cells.join('')}<td><strong>${total}</strong></td></tr>`;
  });
  document.getElementById('languageHeatmap').innerHTML =
    `<p class="section-title">Breach Heatmap — Language × SLA</p><div class="table-wrap"><table><thead><tr><th>Language</th>${codes.map(c=>`<th>${c}</th>`).join('')}<th>Total</th></tr></thead><tbody>${bodyRows.join('')}</tbody></table></div>`;
}

// ─── MISSING KSLs ────────────────────────────────────────────────────────────
function renderMissingKSLs(records) {
  const src = records.filter(r=>r.source==='sla'&&MISSING_KSLS.includes(r.sla_code));
  if (!src.length) { document.getElementById('missingKslContent').innerHTML='<div class="empty-state">No SLA file data loaded for Missing KSLs.</div>'; return; }
  const rows = MISSING_KSLS.map(code => {
    const recs=src.filter(r=>r.sla_code===code);
    const B=recs.filter(r=>r.is_breach).length;
    const rate=recs.length?((B/recs.length)*100).toFixed(1):'0.0';
    const langs=[...new Set(recs.filter(r=>r.is_breach).map(r=>r.iso_language))].filter(Boolean).slice(0,5).join(', ');
    return `<tr><td><strong>${code}</strong></td><td>${recs.length.toLocaleString()}</td><td>${B.toLocaleString()}</td><td>${rate}%</td><td>${langs||'—'}</td></tr>`;
  });
  document.getElementById('missingKslContent').innerHTML =
    `<p class="section-title">Missing KSLs — SLA Source Only</p><div class="table-wrap"><table><thead><tr><th>KSL</th><th>Records</th><th>Breaches</th><th>Rate</th><th>Top Languages (breach)</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
}

// ─── ALERTS ──────────────────────────────────────────────────────────────────
function renderAlerts(records) {
  const alerts = [];
  [...new Set(records.map(r=>r.sla_code))].filter(Boolean).forEach(code => {
    const recs = records.filter(r=>r.sla_code===code);
    const B    = recs.filter(r=>r.is_breach).length;
    const rate = recs.length?(B/recs.length)*100:0;
    if (rate>10) alerts.push({level:'critical',icon:'🔴',title:`High breach rate: ${code}`,desc:`${rate.toFixed(1)}% breach rate (${B} of ${recs.length})`});
    const mayB=records.filter(r=>r.sla_code===code&&r.month==='May'  &&r.is_breach).length;
    const marB=records.filter(r=>r.sla_code===code&&r.month==='March'&&r.is_breach).length;
    if (marB>0&&mayB/marB>1.25) alerts.push({level:'warning',icon:'🟡',title:`Rising trend: ${code}`,desc:`Breaches rose from ${marB} (March) to ${mayB} (May) — +${(((mayB-marB)/marB)*100).toFixed(0)}%`});
  });
  const mayL=new Set(records.filter(r=>r.month==='May'  ).map(r=>r.iso_language));
  const marL=new Set(records.filter(r=>r.month==='March').map(r=>r.iso_language));
  mayL.forEach(lang=>{ if(!marL.has(lang)){ const mb=records.filter(r=>r.month==='May'&&r.iso_language===lang&&r.is_breach).length; if(mb>5) alerts.push({level:'warning',icon:'🟡',title:`New language in May: ${lang}`,desc:`${mb} breaches — not present in March data`}); } });
  if (!alerts.length) alerts.push({level:'stable',icon:'🟢',title:'No critical alerts',desc:'All SLA codes within normal thresholds for the selected period.'});
  document.getElementById('alertsContent').innerHTML = alerts.map(a=>
    `<div class="alert-card alert-${a.level}"><div class="alert-icon">${a.icon}</div><div><div class="alert-title">${a.title}</div><div class="alert-desc">${a.desc}</div></div></div>`
  ).join('');
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
exportBtn.addEventListener('click', () => {
  const r = filtered();
  const h = ['source','schema','month','sla_code','incident_ticket','queue','iso_language','topic','is_breach','excluded'];
  const csv = [h.join(','), ...r.map(rec=>h.map(k=>JSON.stringify(rec[k]??'')).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `breach-analysis-${monthFilter.value}.csv`; a.click();
});
</script>
